<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bg" cx="60%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0a1d37" />
      <stop offset="100%" stop-color="#020711" />
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe066" />
      <stop offset="50%" stop-color="#fbbc05" />
      <stop offset="100%" stop-color="#d19a04" />
    </linearGradient>
    <linearGradient id="chartGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbc05" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#fbbc05" stop-opacity="0" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#fbbc05" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Desktop Canvas Background -->
  <rect width="1920" height="1080" fill="url(#bg)" />

  <!-- LEFT NAVIGATION SIDEBAR -->
  <g transform="translate(0, 0)">
    <rect width="320" height="1080" fill="#030a16" stroke="#0d2242" stroke-width="1" />
    
    <!-- Tesla Brand Logo inside Sidebar -->
    <g transform="translate(45, 60)">
      <path d="M 40,0 L 20,-16 C 30,-18 50,-18 60,-16 Z" fill="url(#gold)" />
      <path d="M 15,-10 C 25,-13 55,-13 65,-10 L 65,-6 C 55,-7 25,-7 15,-6 Z" fill="url(#gold)" />
      <path d="M 35,-2 L 45,-2 L 45,24 C 45,26 42,28 40,28 C 38,28 35,26 35,24 Z" fill="url(#gold)" />
      <text x="90" y="14" font-family="'Space Grotesk', sans-serif" font-weight="900" font-size="28" fill="url(#gold)" letter-spacing="3" filter="url(#glow)">TESLA</text>
      <text x="90" y="34" font-family="'Inter', sans-serif" font-weight="600" font-size="12" fill="#64748b" letter-spacing="2">INVESTMENT</text>
    </g>

    <!-- Sidebar Menu Items -->
    <g transform="translate(40, 200)">
      <!-- Active Item: Home -->
      <g transform="translate(0, 0)">
        <rect x="-10" y="-12" width="260" height="64" rx="16" fill="#fbbc05" fill-opacity="0.08" stroke="#fbbc05" stroke-opacity="0.2" />
        <circle cx="20" cy="20" r="10" fill="url(#gold)" />
        <text x="50" y="27" font-family="'Inter', sans-serif" font-weight="800" font-size="20" fill="#fbbc05">Dashboard</text>
      </g>
      <!-- Item 2: Packages -->
      <g transform="translate(0, 90)">
        <circle cx="20" cy="20" r="10" fill="#64748b" />
        <text x="50" y="27" font-family="'Inter', sans-serif" font-weight="600" font-size="20" fill="#64748b">Investments</text>
      </g>
      <!-- Item 3: Wallet -->
      <g transform="translate(0, 180)">
        <circle cx="20" cy="20" r="10" fill="#64748b" />
        <text x="50" y="27" font-family="'Inter', sans-serif" font-weight="600" font-size="20" fill="#64748b">Secure Wallet</text>
      </g>
      <!-- Item 4: Profile -->
      <g transform="translate(0, 270)">
        <circle cx="20" cy="20" r="10" fill="#64748b" />
        <text x="50" y="27" font-family="'Inter', sans-serif" font-weight="600" font-size="20" fill="#64748b">Account Profiles</text>
      </g>
      <!-- Item 5: Admin Panel -->
      <g transform="translate(0, 360)">
        <circle cx="20" cy="20" r="10" fill="#475569" />
        <text x="50" y="27" font-family="'Inter', sans-serif" font-weight="600" font-size="20" fill="#475569">Admin Gateway</text>
      </g>
    </g>

    <!-- Footer of Sidebar -->
    <text x="40" y="1010" font-family="'JetBrains Mono', sans-serif" font-weight="bold" font-size="14" fill="#334155">SYSTEM CORE: SECURE</text>
  </g>

  <!-- TOP HEADER PANEL -->
  <g transform="translate(320, 0)">
    <rect width="1600" height="110" fill="#030a16" stroke="#0d2242" stroke-width="1" />
    <text x="60" y="66" font-family="'Space Grotesk', sans-serif" font-weight="bold" font-size="32" fill="#ffffff">Automated Cryptographic Portal</text>
    
    <!-- User info right aligned -->
    <g transform="translate(1300, 35)">
      <circle cx="0" cy="20" r="24" fill="#0d2242" />
      <text x="-15" y="27" font-family="'Inter', sans-serif" font-weight="bold" font-size="18" fill="#fbbc05">TI</text>
      <text x="40" y="15" font-family="'Inter', sans-serif" font-weight="bold" font-size="16" fill="#ffffff">Tesla Investor</text>
      <text x="40" y="35" font-family="'JetBrains Mono', sans-serif" font-size="12" fill="#10b981">Verified Node</text>
    </g>
  </g>

  <!-- MAIN DASHBOARD CONTENT AREA -->
  <g transform="translate(320, 110)">
    
    <!-- GRID ROW 1: STATS COUNTERS -->
    <g transform="translate(60, 50)">
      <!-- Box 1 -->
      <g transform="translate(0, 0)">
        <rect width="450" height="160" rx="28" fill="#030a16" stroke="#0d2242" stroke-width="2" />
        <text x="40" y="50" font-family="'Inter', sans-serif" font-weight="600" font-size="16" fill="#64748b" letter-spacing="1">WALLET ACCOUNT BALANCE</text>
        <text x="40" y="115" font-family="'Space Grotesk', sans-serif" font-weight="bold" font-size="44" fill="#ffffff">$12,450.50 <tspan font-size="20" fill="#fbbc05">USD</tspan></text>
      </g>
      <!-- Box 2 -->
      <g transform="translate(490, 0)">
        <rect width="450" height="160" rx="28" fill="#030a16" stroke="#0d2242" stroke-width="2" />
        <text x="40" y="50" font-family="'Inter', sans-serif" font-weight="600" font-size="16" fill="#64748b" letter-spacing="1">TOTAL CAPITAL INVESTED</text>
        <text x="40" y="115" font-family="'Space Grotesk', sans-serif" font-weight="bold" font-size="44" fill="#ffffff">$18,500.00 <tspan font-size="20" fill="#10b981">USD</tspan></text>
      </g>
      <!-- Box 3 -->
      <g transform="translate(980, 0)">
        <rect width="450" height="160" rx="28" fill="#030a16" stroke="#fbbc05" stroke-opacity="0.3" stroke-width="2" />
        <text x="40" y="50" font-family="'Inter', sans-serif" font-weight="600" font-size="16" fill="#64748b" letter-spacing="1">ACCUMULATED DAILY YIELD</text>
        <text x="40" y="115" font-family="'Space Grotesk', sans-serif" font-weight="bold" font-size="44" fill="#ffffff">+$525.00 <tspan font-size="20" fill="#10b981">USD</tspan></text>
      </g>
    </g>

    <!-- GRID ROW 2: CHART (LEFT) & INVESTMENTS (RIGHT) -->
    
    <!-- Performance Chart Section -->
    <g transform="translate(60, 260)">
      <rect width="940" height="600" rx="32" fill="#030a16" stroke="#0d2242" stroke-width="2" />
      <text x="50" y="60" font-family="'Space Grotesk', sans-serif" font-weight="bold" font-size="24" fill="#ffffff">Quantum Distribution Yield Logs</text>
      <text x="50" y="95" font-family="'Inter', sans-serif" font-size="14" fill="#64748b">Real-time performance tracking with direct hourly smart updates</text>

      <!-- SVG Chart Line Graphics -->
      <g transform="translate(50, 150)">
        <!-- Horizontal grid guidelines -->
        <line x1="0" y1="0" x2="840" y2="0" stroke="#0d2242" stroke-opacity="0.4" stroke-width="1" />
        <line x1="0" y1="100" x2="840" y2="100" stroke="#0d2242" stroke-opacity="0.4" stroke-width="1" />
        <line x1="0" y1="200" x2="840" y2="200" stroke="#0d2242" stroke-opacity="0.4" stroke-width="1" />
        <line x1="0" y1="300" x2="840" y2="300" stroke="#0d2242" stroke-opacity="0.4" stroke-width="1" />
        <line x1="0" y1="400" x2="840" y2="400" stroke="#0d2242" stroke-opacity="0.4" stroke-width="1" />

        <!-- Glow fill path -->
        <path d="M 0,350 Q 150,280 300,320 T 600,180 T 750,140 T 840,40" fill="none" stroke="url(#gold)" stroke-width="6" stroke-linecap="round" filter="url(#glow)" />
        <path d="M 0,350 Q 150,280 300,320 T 600,180 T 750,140 T 840,40 L 840,400 L 0,400 Z" fill="url(#chartGlow)" />
        
        <circle cx="840" cy="40" r="8" fill="#fbbc05" />
        <circle cx="840" cy="40" r="18" fill="none" stroke="#fbbc05" stroke-width="2" opacity="0.4" />
      </g>
    </g>

    <!-- Investment Packages list (Right) -->
    <g transform="translate(1040, 260)">
      <rect width="450" height="600" rx="32" fill="#030a16" stroke="#0d2242" stroke-width="2" />
      <text x="40" y="60" font-family="'Space Grotesk', sans-serif" font-weight="bold" font-size="24" fill="#ffffff">Premium Contracts</text>
      
      <!-- Investment Package Item 1 -->
      <g transform="translate(30, 100)">
        <rect width="390" height="135" rx="20" fill="#071224" stroke="#0d2242" stroke-width="1" />
        <text x="30" y="45" font-family="'Space Grotesk', sans-serif" font-weight="bold" font-size="20" fill="#ffffff">Model S Plaid High-Yield</text>
        <text x="30" y="80" font-family="'Inter', sans-serif" font-size="14" fill="#64748b">CAPITAL: <tspan fill="#ffffff">150 USD</tspan> | RETURN: <tspan fill="#10b981">195 USD</tspan></text>
        <text x="30" y="105" font-family="'Inter', sans-serif" font-size="14" fill="#fbbc05">Duration: 24 Hours • Distributed Hourly</text>
        <!-- Gold Invest Button -->
        <rect x="260" y="40" width="100" height="46" rx="12" fill="url(#gold)" />
        <text x="310" y="68" font-family="'Space Grotesk', sans-serif" font-weight="900" font-size="13" fill="#020711" text-anchor="middle">INVEST</text>
      </g>

      <!-- Investment Package Item 2 -->
      <g transform="translate(30, 255)">
        <rect width="390" height="135" rx="20" fill="#071224" stroke="#fbbc05" stroke-opacity="0.3" stroke-width="1" />
        <text x="30" y="45" font-family="'Space Grotesk', sans-serif" font-weight="bold" font-size="20" fill="#ffffff">Model Cybertruck Beast</text>
        <text x="30" y="80" font-family="'Inter', sans-serif" font-size="14" fill="#64748b">CAPITAL: <tspan fill="#ffffff">500 USD</tspan> | RETURN: <tspan fill="#10b981">675 USD</tspan></text>
        <text x="30" y="105" font-family="'Inter', sans-serif" font-size="14" fill="#fbbc05">Duration: 24 Hours • Distributed Hourly</text>
        <!-- Gold Invest Button -->
        <rect x="260" y="40" width="100" height="46" rx="12" fill="url(#gold)" />
        <text x="310" y="68" font-family="'Space Grotesk', sans-serif" font-weight="900" font-size="13" fill="#020711" text-anchor="middle">INVEST</text>
      </g>

      <!-- Investment Package Item 3 -->
      <g transform="translate(30, 410)">
        <rect width="390" height="135" rx="20" fill="#071224" stroke="#0d2242" stroke-width="1" />
        <text x="30" y="45" font-family="'Space Grotesk', sans-serif" font-weight="bold" font-size="20" fill="#ffffff">Roadster Kinetic Max</text>
        <text x="30" y="80" font-family="'Inter', sans-serif" font-size="14" fill="#64748b">CAPITAL: <tspan fill="#ffffff">1500 USD</tspan> | RETURN: <tspan fill="#10b981">2100 USD</tspan></text>
        <text x="30" y="105" font-family="'Inter', sans-serif" font-size="14" fill="#fbbc05">Duration: 48 Hours • Distributed Hourly</text>
        <!-- Gold Invest Button -->
        <rect x="260" y="40" width="100" height="46" rx="12" fill="url(#gold)" />
        <text x="310" y="68" font-family="'Space Grotesk', sans-serif" font-weight="900" font-size="13" fill="#020711" text-anchor="middle">INVEST</text>
      </g>
    </g>
  </g>
</svg>
