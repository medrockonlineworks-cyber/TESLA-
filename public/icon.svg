<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#0a1931" />
      <stop offset="100%" stop-color="#040e21" />
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe066" />
      <stop offset="50%" stop-color="#fbbc05" />
      <stop offset="100%" stop-color="#d19a04" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#fbbc05" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <!-- Smooth rounded background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  
  <!-- Subtle inner border -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="url(#gold)" stroke-width="4" stroke-opacity="0.2" />

  <!-- Tesla style logo group perfectly centered -->
  <g transform="translate(146, 144)" filter="url(#glow)">
    <!-- Tesla "T" shape inside a golden crest -->
    <path d="M 110,32 C 110,32 108,12 110,4 C 110,4 160,0 220,32 C 220,32 110,32 110,32 Z" fill="url(#gold)" />
    <!-- T top bar -->
    <path d="M 30,50 C 70,36 150,36 190,50 C 200,53 210,50 210,50 C 210,50 195,44 185,42 C 145,32 75,32 35,42 C 25,44 10,50 10,50 C 10,50 20,53 30,50 Z" fill="url(#gold)" />
    <!-- T main pillar vertical shaft -->
    <path d="M 94,62 C 94,62 105,58 110,58 C 115,58 126,62 126,62 C 126,62 126,170 126,206 C 126,220 115,225 110,225 C 105,225 94,220 94,206 C 94,170 94,62 94,62 Z" fill="url(#gold)" />
    <!-- Decorative side accents (curved wings) -->
    <path d="M 40,82 C 60,110 80,145 90,180 C 72,160 52,130 30,102 C 26,98 28,90 32,86 C 35,84 38,81 40,82 Z" fill="url(#gold)" opacity="0.8" />
    <path d="M 180,82 C 160,110 140,145 130,180 C 148,160 168,130 190,102 C 194,98 192,90 188,86 C 185,84 182,81 180,82 Z" fill="url(#gold)" opacity="0.8" />
  </g>
  
</svg>
